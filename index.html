<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU STEM Labs</title>
    <style>
      body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background-color: #111; color: white; font-family: sans-serif; padding: 20px; box-sizing: border-box; }
      canvas { border: 1px solid #444; border-radius: 8px; }
      .sub-canvas-wrapper { text-align: center; }
      .sub-canvas-label { font-size: 14px; margin-bottom: 4px; }
      .debug-canvas { border: 1px solid red; }
    </style>
  </head>
  <body>
    <canvas id="main-canvas" width="512" height="512"></canvas>

    <!-- Container for dynamically added canvases -->
    <div id="sub-canvases" style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center;"></div>
  
    <!-- Schema selector (Hidden by default) -->
    <div id="schema-selector-container" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); color: white; text-align: center; z-index: 1000; min-width: 300px;">
      <h3 style="margin-top: 0; margin-bottom: 20px;">Select Simulation Schema</h3>
      <select id="schema-select" style="padding: 10px; font-size: 16px; width: 100%; border-radius: 6px; background-color: #333; color: white; border: 1px solid #555;">
        <option value="">-- Choose a schema --</option>
      </select>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
