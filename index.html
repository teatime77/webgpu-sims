<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU STEM Labs</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/TagInput.css">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

<!-- 【A】ログイン前画面（認証コンテナをそのまま配置） -->
  <div id="login-view">
    <h1 style="text-align: center; margin-top: 50px;">アプリにログイン</h1>
    <div id="firebaseui-auth-container"></div>
  </div>

  <!-- 【B】ログイン後のメイン画面 -->
  <div id="main-view" class="view">

    <header>
      <a href="/" class="at-left">
        <img src="path/to/logo.png" alt="GPUSims" style="height: 3rem; vertical-align: middle;">
      </a>

      <input 
        type="search" 
        id="headerSearch" 
        name="search" 
        placeholder="記事のタイトルやキーワードで検索..." 
        size="30"
        class="at-center"
      >

      <button id="headerLoginBtn" class="at-right" >サインイン</button>
      <span id="logged-in" class="at-right">
        <button id="headerLogoutBtn" >サインアウト</button>
        <button id="headerPostBtn" style="margin-bottom:0;">投稿</button>
        <button id="articleBtn" style="margin-bottom:0;">記事</button>
        <span id="headerUserId" style="font-weight: bold; font-size: 0.9rem;"></span>
      </span>
    </header>

    <main>
      <p>ここにアプリのメインコンテンツが入ります。</p>
    </main>
    <footer>
      <div id="error-msg">Loading...</div>
    </footer>
  </div>

  <div id="edit-view">
    <header  style="height: 50px;">
      <span class="at-left">
        <button id="capture-btn" >Capture</button>
        <button id="burst-btn">Burst xN</button>
        <label for="capture-count" >N:
          <input id="capture-count"   type="number" min="1" max="200" step="1" value="10" />
        </label>

        <label >interval:
          <input id="capture-interval"  type="number" min="10" max="5000" step="10" value="100" />
        </label>
      </span>

      <span class="at-center">
        <button>Save</button>
      </span>

      <!-- <span class="at-right"></span> -->
    </header>
    <main>
      <div class="header">
          <div class="at-left">
            <canvas id="main-canvas" width="512" height="512" ></canvas>
          </div>
          <div class="at-center" ></div>
          <div id="main1"  class="at-right" style="width: 512px;" ></div>
      </div>

      <div id="sub-canvases" style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center;"></div>

      <h3>schema</h3>
      <div id="schema-editor" class="editor-container">
          <textarea class="hidden-textarea" spellcheck="false"></textarea>
          <canvas class="render-canvas" width="800" height="400"></canvas>
      </div>

      <p></p>
      <h4>WGSL</h4>
      <div id="wgsl-editor" class="editor-container">
          <textarea class="hidden-textarea" spellcheck="false"></textarea>
          <canvas class="render-canvas" width="800" height="400"></canvas>
      </div>
    </main>
  </div>

  <div id="user-view">
    <h2>ユーザーIDの初期設定</h2>
    <p>他のユーザーに公開される一意のID（publicId）を決めてください。</p>
    <input type="text" id="publicIdInput" placeholder="例: ko_hamada" />
    <button id="registerBtn">登録する</button>
  </div>

  <div id="article-view">
      <header>
        <span class="at-right">
          <button>Save</button>
          <button>Publish</button>
        </span>
      </header>
      <input id="title" type="text" placeholder="Title"  />
      <div id="my-tag-input"></div>
      <div>

      </div>

  </div>

  <script type="module" src="/src/start.ts"> </script>
</body>
</html>
